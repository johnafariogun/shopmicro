apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: shopmicro
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}
    processors:
      batch: {}
    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: "shopmicro"
      otlp:
        endpoint: "tempo:4317"
        tls:
          insecure: true
      # --- THE FIX: Use standard OTLP HTTP for Loki ---
      otlphttp/loki:
        endpoint: "http://loki:3100/otlp"
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [batch]
          # --- THE FIX: Point the logs pipeline to the new exporter ---
          exporters: [otlphttp/loki]
      
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: shopmicro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: loki
          image: grafana/loki:latest
          args:
            - "-config.file=/etc/loki/loki.yaml"
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: loki-config
              mountPath: /etc/loki
            - name: loki-storage
              mountPath: /loki
      volumes:
        - name: loki-config
          configMap:
            name: loki-config
        - name: loki-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: shopmicro
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
