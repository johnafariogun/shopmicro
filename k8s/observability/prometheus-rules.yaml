apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: shopmicro
data:
  shopmicro.rules.yaml: |
    groups:
      - name: shopmicro-slo-alerts
        rules:
          - alert: BackendHighErrorRate
            expr: |
              # --- THE FIX: Changed to http_request_duration_seconds_count ---
              sum(rate(http_request_duration_seconds_count{status=~"5..", app=~"shopmicro-backend|shopmicro-ml"}[5m])) 
              / 
              sum(rate(http_request_duration_seconds_count{app=~"shopmicro-backend|shopmicro-ml"}[5m])) > 0.05
            for: 5m
            labels:
              severity: critical
              team: platform-engineering
            annotations:
              summary: "High 5xx error rate on ShopMicro APIs"
              description: "The API error rate has exceeded our 5% SLO threshold for over 5 minutes. Current rate is {{ $value | humanizePercentage }}."
              runbook_url: "https://github.com/johnafariogun/shopmicro/wiki/Runbook-HighErrorRate"

          - alert: BackendLatencyDegradation
            # --- THIS ONE WAS ALREADY PERFECT! ---
            expr: |
              histogram_quantile(0.90, sum(rate(http_request_duration_seconds_bucket{app=~"shopmicro-backend|shopmicro-ml"}[10m])) by (le)) > 0.200
            for: 10m
            labels:
              severity: warning
              team: platform-engineering
            annotations:
              summary: "Severe latency degradation on ShopMicro APIs"
              description: "The 90th percentile latency has remained above the 200ms SLO threshold for 10 minutes. Current p90 is {{ $value }} seconds."
              runbook_url: "https://github.com/johnafariogun/shopmicro/wiki/Runbook-LatencyDegradation"
