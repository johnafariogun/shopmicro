[defaults]
inventory = inventory.ini
host_key_checking = False
remote_user = ubuntu
deprecation_warnings = False

[privilege_escalation]
become = True
become_method = sudo
become_user = root

# --- ADD THIS NEW BLOCK ---
[ssh_connection]
pipelining = True
ssh_args = -o ServerAliveInterval=30 -o ServerAliveCountMax=5 -o ControlMaster=auto -o ControlPersist=60s